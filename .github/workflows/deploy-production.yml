name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to workmate-01
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 77.42.17.200 >> ~/.ssh/known_hosts

      - name: Sync backend
        run: |
          rsync -avz --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude '.env*' \
            backend/ joshua@77.42.17.200:/srv/workmate/backend/

      - name: Sync frontend
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env*' \
            ui/ joshua@77.42.17.200:/srv/workmate/frontend/

      - name: Sync assets
        run: |
          if [ -d "assets" ]; then
            rsync -avz --delete assets/ joshua@77.42.17.200:/srv/workmate/assets/
          fi

      - name: Upload .env.prod
        run: |
          printf '%s\n' \
            "POSTGRES_USER=workmate" \
            "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
            "POSTGRES_DB=workmate" \
            "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
            "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
            "ENVIRONMENT=production" \
            "STORAGE_BACKEND=local" \
            > .env.prod
          scp .env.prod joshua@77.42.17.200:/srv/workmate/env/.env.prod
          rm .env.prod

      - name: Build and restart via systemd
        run: |
          ssh joshua@77.42.17.200 << 'ENDSSH'
            cd /srv/workmate/infra
            docker compose --env-file ../env/.env.prod build --no-cache
            sudo systemctl restart workmate
          ENDSSH

      - name: Wait for services to start
        run: sleep 30

      - name: Verify containers are running
        run: |
          ssh joshua@77.42.17.200 "cd /srv/workmate/infra && docker compose --env-file ../env/.env.prod ps"
          BACKEND_STATUS=$(ssh joshua@77.42.17.200 "cd /srv/workmate/infra && docker compose --env-file ../env/.env.prod ps --format json | python3 -c \"import json,sys; data=json.load(sys.stdin); items=data if isinstance(data,list) else [data]; print(next((s.get('State','') for s in items if 'backend' in s.get('Service','')), 'not_found'))\"")
          echo "Backend status: $BACKEND_STATUS"
          if [ "$BACKEND_STATUS" != "running" ]; then
            echo "Backend container is not running!"
            ssh joshua@77.42.17.200 "cd /srv/workmate/infra && docker compose --env-file ../env/.env.prod logs --tail=50 backend"
            exit 1
          fi

      - name: Health check
        run: |
          MAX_RETRIES=12
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.workmate.kit-it-koblenz.de/system/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend healthy (HTTP $HTTP_CODE)"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES - HTTP $HTTP_CODE, waiting 5s..."
            sleep 5
          done
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Health check failed after $MAX_RETRIES attempts"
            ssh joshua@77.42.17.200 "cd /srv/workmate/infra && docker compose --env-file ../env/.env.prod logs --tail=100 backend"
            exit 1
          fi
          HTTP_FRONT=$(curl -s -o /dev/null -w "%{http_code}" https://workmate.kit-it-koblenz.de)
          if [ "$HTTP_FRONT" != "200" ]; then
            echo "Frontend health check failed: $HTTP_FRONT"
            exit 1
          fi
          echo "All services healthy!"

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Frontend: https://workmate.kit-it-koblenz.de"
          echo "Backend:  https://api.workmate.kit-it-koblenz.de"
