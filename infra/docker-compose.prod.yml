################################
# Production Docker Compose    #
# Workmate OS — workmate-01    #
# Caddy Reverse Proxy          #
################################

services:
  db:
    image: postgres:16
    container_name: workmate_db
    restart: unless-stopped
    networks:
      - workmate
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: workmate_backend
    restart: unless-stopped
    networks:
      - workmate
    env_file:
      - ../env/.env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: workmate_frontend
    restart: unless-stopped
    networks:
      - workmate
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2
    container_name: workmate_caddy
    restart: unless-stopped
    networks:
      - workmate
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../reverse-proxy/Caddyfile:/etc/caddy/Caddyfile
      - ../reverse-proxy/data:/data
      - ../reverse-proxy/config:/config

networks:
  workmate:
    driver: bridge
