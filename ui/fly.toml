app = 'workmate-ui'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile.prod"
  [build.args]
    VITE_API_BASE = "https://workmate-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
