# fly.toml app configuration file generated for workmate-api on 2026-02-03T15:10:17+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'workmate-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile.prod'

[env]
  ENVIRONMENT = 'production'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/system/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
