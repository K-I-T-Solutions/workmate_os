app = 'workmate-api'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile.prod"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/system/health"
  timeout = "10s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
