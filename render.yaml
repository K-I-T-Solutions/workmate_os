services:
  # Backend API - FastAPI
  - type: web
    name: workmate-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workmate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend - Vue 3 + Vite
  - type: web
    name: workmate-ui
    runtime: static
    rootDir: ui
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: workmate-db
    plan: free
    databaseName: workmate_os
    user: workmate
